<!DOCTYPE html>
<html lang="ja">
<head>
    //githubアプリアイコン指定
    <link rel="apple-touch-icon"
      href="">
    //githubファヴィ婚指定
    <link rel="icon"
      type="image/png"
      href="https://raw.githubusercontent.com/sakuraps1134/sagabus-navi/main/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable"
      content="yes">
      <meta name="theme-color"
      content="#ffffff">

<meta name="apple-mobile-web-app-status-bar-style"
      content="black-translucent">

<meta name="apple-mobile-web-app-title"
      content="祐徳バスナビ">
    <title>祐徳バスナビ</title>

    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.x/dist/protobuf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #vehicleCount{
    position:fixed;
    top:10px;
    right:10px;
    z-index:1000;

    background:white;
    padding:8px 12px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);

    font-weight:bold;
}
       html,
body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:sans-serif;
}

#map{
    position:fixed;
    inset:0;
    z-index:1;
}

#header{
    position:fixed;
    top:10px;
    left:10px;
    z-index:1000;

    background:white;
    padding:8px 12px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);

    font-weight:bold;
}

#filterContainer{
    position:fixed;
    bottom:60px;
    left:10px;
    z-index:1000;
}

#filterPanel{
    display:none;

    margin-top:5px;

    background:white;
    padding:8px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);

    max-height:200px;
    overflow-y:auto;

    font-size:13px;
}

#filterToggle{
    background:white;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    cursor:pointer;
}


#status{
    position:fixed;
    bottom:10px;
    left:10px;
    z-index:1000;

    background:white;
    padding:8px 12px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);

    font-size:14px;
}

.scrollable-table{
    max-height:180px;
    overflow-y:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
}

th,
td{
    border:1px solid #eee;
    padding:2px 4px;
}

.leaflet-popup-content{
    width:min(240px,70vw) !important;
}
    </style>
</head>
<body>

<div id="map"></div>

<div id="header">
    祐徳バスナビ
</div>

<div id="filterContainer">

    <button id="filterToggle">
        車両選択 ▼
    </button>

    <div id="filterPanel"></div>

</div>

<div id="status">
    読み込み中...
</div>
<div id="vehicleCount">
    0台
</div>

<script>

const PROTO_PATH = '/gtfs-realtime.proto';

const FEED_URL =
    'https://sagabus-proxy.sakuraps1134.workers.dev/';


//車両リスト
const VEHICLE_CSV =
    '';
//停留所リスト
const STOPS_CSV =
    'https://raw.githubusercontent.com/sakuraps1134/sagabus-navi/main/stops.txt';
//トリップidリスト(祐徳含まれてたっけ？)
const TRIP_SCHEDULES_JSON =
    'https://raw.githubusercontent.com/sakuraps1134/sagabus-navi/main/trip_schedules.json';
//表示アイコンリスト
const ICONLIST_CSV =
    '';


// ------------------
// グローバル変数
// ------------------

let vehicleMap = {};
let stopsMap = {};
let tripSchedules = {};
let markers = [];
let positionHistory = {};
let historyCircles = [];
let iconList = [];
let enabledTypes = {};
let userMarker = null;
let userAccuracyCircle = null;


// ------------------
// 地図
// ------------------

const map = L.map('map').setView(
    [33.2635, 130.3016],
    13
);

setTimeout(() => {
    map.invalidateSize();
}, 100);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution:'© OpenStreetMap'
    }
).addTo(map);

if(navigator.geolocation){

    navigator.geolocation.watchPosition(

        pos => {

            const lat =
                pos.coords.latitude;

            const lng =
                pos.coords.longitude;

            const accuracy =
                pos.coords.accuracy;

            if(!userMarker){

                userMarker =
                    L.circleMarker(
                        [lat,lng],
                        {
                            radius:8,
                            color:'#0066ff',
                            fillColor:'#0066ff',
                            fillOpacity:0.8
                        }
                    ).addTo(map);

                userAccuracyCircle =
                    L.circle(
                        [lat,lng],
                        {
                            radius:accuracy,
                            color:'#0066ff',
                            fillColor:'#66aaff',
                            fillOpacity:0.25
                        }
                    ).addTo(map);

            }else{

                userMarker.setLatLng(
                    [lat,lng]
                );

                userAccuracyCircle.setLatLng(
                    [lat,lng]
                );

                userAccuracyCircle.setRadius(
                    accuracy
                );
            }

        },

        err => {
            console.error(err);
        },

        {
            enableHighAccuracy:true,
            maximumAge:5000,
            timeout:10000
        }
    );
}


// ------------------
// CSV読込
// ------------------

async function fetchShiftJisCsv(url) {

    const response = await fetch(url);

    const buffer = await response.arrayBuffer();

    const decoder = new TextDecoder('shift-jis');

    return decoder.decode(buffer);
}

async function fetchUtf8Text(url) {

    const response = await fetch(url);

    return await response.text();
}


// ------------------
// 初期化
// ------------------

async function initData() {

    //
    // vehicle.csv
    //

    const csvVehicle =
        await fetchShiftJisCsv(VEHICLE_CSV);

    await new Promise(resolve => {

        Papa.parse(csvVehicle, {

            complete: (r) => {

                r.data.forEach(row => {

                    if (row.length >= 2) {

                        vehicleMap[
                            row[0]
                                .trim()
                                .replace(/^0+/, '')
                        ] = row[1];
                    }
                });

                resolve();
            }
        });
    });

    console.log(
        'vehicle loaded',
        Object.keys(vehicleMap).length
    );


    //
    // stops.txt
    //

    const csvStops =
        await fetchUtf8Text(STOPS_CSV);

    await new Promise(resolve => {

        Papa.parse(csvStops, {

            header: true,

            complete: (r) => {

                console.log(
                    'stops sample',
                    r.data[0]
                );

                r.data.forEach(row => {

                    const stopId =
                        row.stop_id ||
                        row['﻿stop_id'];

                    const stopName =
                        row.stop_name;

                    if (stopId && stopName) {

                        stopsMap[
                            stopId.trim()
                        ] = stopName.trim();
                    }
                });

                resolve();
            }
        });
    });

    console.log(
        'stops loaded',
        Object.keys(stopsMap).length
    );

    console.log(
        '1001002-01 =>',
        stopsMap['1001002-01']
    );


    //
    // trip_schedules.json
    //

    tripSchedules =
        await fetch(TRIP_SCHEDULES_JSON)
            .then(r => r.json());

    console.log(
        'tripSchedules loaded',
        Object.keys(tripSchedules).length
    );
   const iconCsv =
    await fetchShiftJisCsv(ICONLIST_CSV);

await new Promise(resolve=>{

   Papa.parse(iconCsv,{

    header:true,

    complete:(r)=>{

        console.log("icon csv first row", r.data[0]);

        r.data.forEach(row=>{

            const type =
                row.type ||
                row["﻿type"];

            const name =
                row.name ||
                row["﻿name"];

            const url =
                row.URL ||
                row.Url ||
                row.url;

            const vehiclelist =
                row.vehiclelist ||
                row["﻿vehiclelist"];

            if(!type || !vehiclelist){
                console.log("skip", row);
                return;
            }

            iconList.push({
                type,
                name,
                url,
                vehicles: vehiclelist
                    .replace(/[{}]/g,'')
                    .split(',')
                    .map(v => v.trim())
            });

            enabledTypes[type] = true;
        });

        console.log("iconList", iconList);

        resolve();
    }
});

});
const panel =
    document.getElementById('filterPanel');

panel.innerHTML =
    iconList.map(icon=>`
        <div>
            <label>
                <input
                    type="checkbox"
                    checked
                    data-type="${icon.type}"
                >
                ${icon.name}
            </label>
        </div>
    `).join('');

panel.querySelectorAll('input')
.forEach(cb=>{

    cb.addEventListener('change',()=>{

        enabledTypes[
            cb.dataset.type
        ] = cb.checked;

        loadBusData();
    });

});

const toggle =
    document.getElementById(
        'filterToggle'
    );

toggle.addEventListener('click',()=>{

    const panel =
        document.getElementById('filterPanel');

    const opened =
        panel.style.display === 'block';

    panel.style.display =
        opened ? 'none' : 'block';

    toggle.textContent =
        opened
        ? '車両選択 ▲'
        : '車両選択 ▼';
});

}
function getVehicleIcon(busLabel){

    const vehicleNo =
        String(busLabel)
            .match(/^\d+/)?.[0];

    if(!vehicleNo) return null;

    const match =
        iconList.find(icon =>
            icon.vehicles.includes(vehicleNo)
        );

    if(!match) return null;

    return {
        type: match.type,
        url: match.url
    };
}


// ------------------
// バス位置更新
// ------------------

async function loadBusData() {


    try {
    let visibleCount = 0;

        const root =
            await protobuf.load(PROTO_PATH);

        const buffer =
            await (
                await fetch(FEED_URL)
            ).arrayBuffer();

        const message =
            root
                .lookupType(
                    'transit_realtime.FeedMessage'
                )
                .decode(
                    new Uint8Array(buffer)
                );

        markers.forEach(m =>
            map.removeLayer(m)
        );

        markers = [];
        historyCircles.forEach(c =>
    map.removeLayer(c)
);

historyCircles = [];

        message.entity.forEach(item => {
//祐徳バス（trip_idが3から始まる）を指定
            if (
                item.vehicle?.trip &&
                item.vehicle.trip.tripId.startsWith('3')
            ) {

                const tripId =
                    item.vehicle.trip.tripId;

                const rawId =
                    item.vehicle.vehicle.id
                        .replace(/^0+/, '');

                const {
                    latitude,
                    longitude
                } = item.vehicle.position;

                if (!positionHistory[tripId]) {
    positionHistory[tripId] = [];
}

positionHistory[tripId].push({
    lat: latitude,
    lng: longitude
});

if (positionHistory[tripId].length > 3) {
    positionHistory[tripId].shift();
}
const history =
    positionHistory[tripId];
    if (history.length >= 2) {

    const prev =
        history[history.length - 2];

    const circle1 = L.circle(
        [prev.lat, prev.lng],
        {
            radius: 30,
            color: '#55cfff',
            weight: 2,
            fillColor: '#bdefff',
            fillOpacity: 0.35
        }
    ).addTo(map);

    historyCircles.push(circle1);
}
if (history.length >= 3) {

    const prev2 =
        history[history.length - 3];

    const circle2 = L.circle(
        [prev2.lat, prev2.lng],
        {
            radius: 15,
            color: '#55cfff',
            weight: 2,
            fillColor: '#d8f6ff',
            fillOpacity: 0.25
        }
    ).addTo(map);

    historyCircles.push(circle2);
}

                const busLabel =
                    vehicleMap[rawId] ||
                    `車両ID:${rawId}`;

                const rows =
                    (tripSchedules[tripId] || [])
                    .map(s => {

                        const stopName =
                            stopsMap[s.stop_id] ||
                            s.stop_id;

                        return `
                            <tr>
                                <td>${(s.time || '').slice(0,5)}</td>
                                <td>${stopName}</td>
                            </tr>
                        `;
                    })
                    .join('');

                const iconInfo =
    getVehicleIcon(busLabel);
    console.log(
    "rawId",
    rawId,
    "iconInfo",
    iconInfo
);

if(
    iconInfo &&
    !enabledTypes[iconInfo.type]
){
    return;
}

let marker;

if(iconInfo){

    const busIcon =
        L.icon({

            iconUrl:
                iconInfo.url,

           iconSize:[32,32],
iconAnchor:[16,16],

            popupAnchor:[0,-20]
        });

    marker =
        L.marker(
            [latitude,longitude],
            {icon:busIcon}
        ).addTo(map);

}else{

    marker =
        L.marker([
            latitude,
            longitude
        ]).addTo(map);
}

               marker.bindPopup(`
    <b>${busLabel}</b>

    <div class="scrollable-table">

        <table>

            <thead>
                <tr>
                    <th>時刻</th>
                    <th>停留所</th>
                </tr>
            </thead>

            <tbody>
                ${rows}
            </tbody>

        </table>

    </div>
`,{
    autoPan:true,
    autoPanPaddingTopLeft:[10,80],
    autoPanPaddingBottomRight:[10,10]
});

                markers.push(marker);
                visibleCount++;
            }
        });
        document.getElementById(
    'vehicleCount'
).textContent =
    `表示中 ${visibleCount}台`;

        document.getElementById(
            'status'
        ).textContent =
            '最終更新時刻: ' +
            new Date().toLocaleTimeString();

    } catch (err) {

        console.error(err);
    }
}


// ------------------
// 開始
// ------------------

initData().then(() => {

    loadBusData();

    setInterval(
        loadBusData,
        20000
    );
});

</script>

</body>
</html>
